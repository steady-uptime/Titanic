# configs/config.yaml
project_name: "Titanic_Survival_Prediction"

env:
  mode: "dev" # Options: dev, staging, prod
  compute:
    num_workers: 4
    gpu_id: 0
    memory_limit_gb: 16

data:
  raw_path: "data/raw"
  processed_path: "data/processed"
  external_path: "data/external" 
  target_column: "Survived"
  split_config:
    test_size: 0.2
    random_state: 42
  preprocessing:
    drop_columns: ["PassengerId", "Name", "Ticket"]
    imputation_rules:
      Age: "median"
      Fare: "median"
    encoding_rules:
      Sex: {"male": 0, "female": 1}
      Embarked: {"S": 0, "C": 1, "Q": 2}
      Cabin_Deck: {"A": 1, "B": 2, "C": 3, "D": 4, "E": 5, "F": 6, "G": 7, "U": 8}
  schema:
    - column: "PassengerId"
      type: "int64"
    - column: "Survived"
      type: "int64"
    - column: "Pclass"
      type: "int64"
    - column: "Name"
      type: "object"
    - column: "Sex"
      type: "object"
    - column: "Age"
      type: "float64"
    - column: "SibSp"
      type: "int64"
    - column: "Parch"
      type: "int64"
    - column: "Ticket"
      type: "object"
    - column: "Fare"
      type: "float64"
    - column: "Cabin"
      type: "object"
    - column: "Embarked"
      type: "object"

artifacts:
  input_file: "titanic.csv"
  output_file: "titanic_processed.csv"
  base_path: "models/artifacts"

model:
  name: "random_forest_classifier"
  type: "sklearn"
  params:
    n_estimators: 100
    max_depth: 10
    random_state: 42

training:
  learning_rate: 0.001
  batch_size: 32
  epochs: 100

logging:
  file_path: "logs/pipeline.log"
  level: "DEBUG"
  rotation: "500 MB"
  retention: "10 days"
