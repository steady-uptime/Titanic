project_name: "Titanic_Survival_Prediction"

env:
  mode: "dev" # Options: dev, staging, prod
  compute:
    num_workers: 4
    gpu_id: 0
    memory_limit_gb: 16

data:
  raw_path: "data/raw"
  processed_path: "data/processed"
  external_path: "data/external" 
  target_column: "Survived"
  preprocessing:
    drop_columns: ["PassengerId", "Name", "Ticket", "HomePort"]
    imputation_rules:
      Age: "median"
      Fare: "median"
    encoding_rules:
      Sex: {"male": 0, "female": 1}
      Embarked: {"S": 0, "C": 1, "Q": 2}
      Cabin_Deck: {"A": 1, "B": 2, "C": 3, "D": 4, "E": 5, "F": 6, "G": 7, "U": 8}

artifacts:
  input_file: "titanic.csv"
  output_file: "titanic_processed.csv"
  model_path: "models/artifacts/model_v1.joblib"

model:
  name: "random_forest_classifier"
  type: "sklearn"
  save_path: "models/artifacts/" 
  params:
    n_estimators: 100
    max_depth: 10
    random_state: 42

training:
  learning_rate: 0.001
  batch_size: 32
  epochs: 100

logging:
  path: "logs"
  level: "INFO"
